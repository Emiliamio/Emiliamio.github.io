inject:
  head:
    - <script>(function(){var n=10,u='/images/random/bg'+(Math.floor(Math.random()*n)+1)+'.webp';var s=document.createElement('style');s.textContent='#page-header{background-image:url('+u+') !important}';document.head.appendChild(s);var l=document.createElement('link');l.rel='preload';l.as='image';l.href=u;document.head.appendChild(l);window.addEventListener('load',function(){setTimeout(function(){for(var k=1;k<=n;k++){var p='/images/random/bg'+k+'.webp';if(p!==u){(new Image()).src=p}}},1000)})})();</script>
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="stylesheet" href="/css/sakura.min.css">
    - <script>(function(){var gc=HTMLCanvasElement.prototype.getContext;HTMLCanvasElement.prototype.getContext=function(t,a){if(t&&String(t).indexOf('webgl')>-1){a=a||{};a.preserveDrawingBuffer=true}return gc.call(this,t,a)};function hasContent(){var c=document.getElementById('live2dcanvas');if(!c||!c.width)return false;try{var s=document.createElement('canvas');s.width=40;s.height=80;var x=s.getContext('2d');x.drawImage(c,0,0,40,80);var d=x.getImageData(0,0,40,80).data;var n=0;for(var i=0;i<d.length;i+=4){if(d[i+3]>40&&!(d[i]>235&&d[i+1]>235&&d[i+2]>235)){n++}}return n>60}catch(e){return false}}var t0=Date.now();var iv=setInterval(function(){var w=document.getElementById('live2d-widget');if(w&&hasContent()){clearInterval(iv);w.classList.add('l2d-show')}else if(Date.now()-t0>15000){clearInterval(iv);iv=setInterval(function(){var w2=document.getElementById('live2d-widget');if(w2&&hasContent()){clearInterval(iv);w2.classList.add('l2d-show')}},2000)}},250)})();</script>

    - <script>document.addEventListener('DOMContentLoaded',function(){if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){['busuanzi_value_site_uv','busuanzi_value_site_pv'].forEach(function(id){var el=document.getElementById(id);var row=el&&el.closest('.webinfo-item');if(row){row.style.display='none'}})}})</script>
  bottom:
